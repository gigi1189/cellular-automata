<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Cellular Automata</title>
</head>

<body>
    <div id="layout">
        <div id="ui">
            <button id="toggleNav">☰</button><br>

            <div class="controls">
            <p>Cellular Automata! Yay!</p>
                <label>Grid Size</label>
                <input id="gridSize" type="range" min="20" max="200" value="80"> <br>
                <label>Speed</label>
                <input id="speed" type="range" min="1" max="60" value="12"> <br>
                <button onclick="resetGrid()">Reset</button>
            </div>
        </div>

        <div id="right">
            <div id="grid-holder"></div>
        </div>
    </div>
</body>

</html>
